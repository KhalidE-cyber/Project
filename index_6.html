    <style>
        *, body, html { box-sizing: border-box; }
        body, html {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh; height: 100dvh;
        }

        /* ── Layout ── */
        #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
        /* Map fills remaining space; footer is fixed so use padding to avoid overlap */
        #map { flex: 1; min-height: 0; }
        /* Footer: fixed, always visible, solid bg, above everything */
        footer {
            position: fixed !important;
            bottom: 0; left: 0; right: 0;
            z-index: 9999;
            background: #ffffff;
            border-top: 1px solid #e5e7eb;
        }
        /* Leaflet padding so map content isn't hidden under fixed footer */
        .leaflet-container { padding-bottom: 68px; }

        /* ── Hero Banner ── */
        #hero-banner {
            background: linear-gradient(135deg, #1a3a2a 0%, #1e4d38 40%, #1a3a55 100%);
            position: relative; overflow: hidden;
            flex-shrink: 0;
        }
        #hero-banner::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        #hero-banner .crescent {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            opacity: 0.12; font-size: 60px; line-height: 1;
        }

        /* ── Hijri date badge pulse ── */
        .hijri-dot {
            width: 7px; height: 7px; background: #6cc368;
            border-radius: 50%; display: inline-block;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── Leaflet overrides ── */
        .leaflet-container { font-family: 'Tajawal', sans-serif; }
        .leaflet-popup-content-wrapper {
            border-radius: 14px; padding: 0; overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,.18);
            direction: rtl; text-align: right; border: none;
        }
        .leaflet-popup-content { margin: 0; width: 290px !important; }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-close-button {
            color: #fff !important; font-size: 20px !important;
            top: 6px !important; left: 6px !important; right: auto !important; z-index: 10;
        }

        /* ── Clusters ── */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(108,195,104,.3); border-radius: 50%;
        }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(108,195,104,.95); color: #fff; font-weight: 800;
            font-size: 13px; border-radius: 50%; margin: 5px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,.15);
        }

        /* ── Umrah path ── */
        .umrah-path { stroke-dasharray: 8,14; animation: dash 1.8s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -22; } }

        /* ── Makkah pin ── */
        .makkah-icon { position: relative; display: flex; justify-content: center; align-items: center; }
        .makkah-pulse {
            position: absolute; width: 64px; height: 64px;
            background: rgba(212,175,55,.3); border-radius: 50%;
            animation: pulse 2s ease-out infinite; z-index: -1;
        }
        @keyframes pulse { 0%{transform:scale(.3);opacity:1} 100%{transform:scale(1.8);opacity:0} }

        /* ── Marker hover ── */
        .interactive-marker { transition: transform .2s ease, filter .2s ease; }
        .interactive-marker:hover { transform: scale(1.1) translateY(-4px) !important; filter: brightness(1.1); }

        /* ── Loading overlay ── */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(6px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            transition: opacity .5s ease;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 48px; height: 48px;
            border: 5px solid #e5e7eb; border-top-color: #6cc368;
            border-radius: 50%; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Skeleton shimmer on header counter while loading ── */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px; color: transparent !important;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* ════════════════════════════════════════════
           Minimal utility CSS replacing Tailwind CDN
           Only classes used in this file are defined
           ════════════════════════════════════════════ */

        /* Flex */
        .flex{display:flex}.flex-col{flex-direction:column}.flex-1{flex:1}.flex-shrink-0{flex-shrink:0}
        .items-center{align-items:center}.items-end{align-items:flex-end}
        .justify-center{justify-content:center}.justify-between{justify-content:justify-between}
        .justify-start{justify-content:flex-start}
        .gap-1{gap:4px}.gap-1\.5{gap:6px}.gap-2{gap:8px}.gap-2\.5{gap:10px}.gap-3{gap:12px}
        /* Spacing */
        .p-0{padding:0}.p-3{padding:12px}.p-4{padding:16px}.p-5{padding:20px}
        .p-2{padding:8px}.p-2\.5{padding:10px}.p-3{padding:12px}
        .px-2{padding-left:8px;padding-right:8px}.px-2\.5{padding-left:10px;padding-right:10px}
        .px-3{padding-left:12px;padding-right:12px}.px-4{padding-left:16px;padding-right:16px}
        .py-1{padding-top:4px;padding-bottom:4px}.py-2{padding-top:8px;padding-bottom:8px}
        .py-2\.5{padding-top:10px;padding-bottom:10px}.py-3{padding-top:12px;padding-bottom:12px}

        .mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.ml-1{margin-left:4px}.ml-2{margin-left:8px}
        /* Sizing */
        .w-full{width:100%}.w-auto{width:auto}.w-8{width:32px}.h-3{height:12px}
        .h-10{height:40px}.h-12{height:48px}.h-14{height:56px}.h-16{height:64px}
        .h-36{height:144px}.max-w-4xl{max-width:56rem}.mx-auto{margin-left:auto;margin-right:auto}
        .container{width:100%}
        /* Typography */
        .text-xs{font-size:12px;line-height:16px}.text-sm{font-size:14px;line-height:20px}

        .font-medium{font-weight:500}.font-bold{font-weight:700}.font-extrabold{font-weight:800}
        .leading-none{line-height:1}.leading-tight{line-height:1.25}.leading-snug{line-height:1.375}
        .text-center{text-align:center}.text-right{text-align:right}.text-left{text-align:left}
        .uppercase{text-transform:uppercase}.tracking-wide{letter-spacing:.025em}
        /* Colors */
        .text-white{color:#fff}.text-gray-500{color:#6b7280}.text-gray-600{color:#4b5563}
        .text-gray-700{color:#374151}.text-gray-800{color:#1f2937}.text-gray-900{color:#111827}
        .text-green-600{color:#16a34a}
        .bg-white{background:#fff}.bg-gray-50{background:#f9fafb}.bg-blue-50{background:#eff6ff}
        .bg-green-50{background:#f0fdf4}.bg-yellow-50{background:#fefce8}
        .border{border-width:1px;border-style:solid}.border-t{border-top-width:1px;border-top-style:solid}
        .border-b{border-bottom-width:1px;border-bottom-style:solid}
        .border-gray-100{border-color:#f3f4f6}.border-gray-200{border-color:#e5e7eb}
        .border-blue-100{border-color:#dbeafe}.border-green-100{border-color:#dcfce7}
        .border-yellow-100{border-color:#fef9c3}.border-yellow-200{border-color:#fef08a}
        /* Brand colours */
        .text-brand-green{color:#6cc368}.text-brand-blue{color:#337dbb}.text-brand-gold{color:#d4af37}
        .bg-brand-green{background:#6cc368}.bg-brand-blue{background:#337dbb}
        /* Opacity variants */
        .text-white\/60{color:rgba(255,255,255,.6)}.text-white\/70{color:rgba(255,255,255,.7)}
        .bg-white\/10{background:rgba(255,255,255,.1)}
        /* Borders */
        .border-white\/20{border-color:rgba(255,255,255,.2)}
        .rounded{border-radius:4px}.rounded-lg{border-radius:8px}.rounded-xl{border-radius:12px}
        .rounded-2xl{border-radius:16px}.rounded-full{border-radius:9999px}.overflow-hidden{overflow:hidden}
        /* Shadow */
        .shadow{box-shadow:0 1px 3px rgba(0,0,0,.1),.0 1px 2px rgba(0,0,0,.06)}
        .shadow-inner{box-shadow:inset 0 2px 4px rgba(0,0,0,.06)}
        /* Display */
        .block{display:block}.hidden{display:none}.relative{position:relative}.absolute{position:absolute}
        .inset-0{top:0;right:0;bottom:0;left:0}.z-0{z-index:0}.z-10{z-index:10}.z-50{z-index:50}.z-9999{z-index:9999}
        /* Transition */
        .transition{transition:all .15s ease}.transition-all{transition:all .15s ease}
        .hover\:bg-green-600:hover{background:#16a34a}.hover\:bg-blue-600:hover{background:#2563eb}
        .hover\:bg-yellow-100:hover{background:#fef9c3}
        .active\:scale-95:active{transform:scale(.95)}
        /* Object */
        .object-contain{object-fit:contain}.object-cover{object-fit:cover}
        /* Responsive: show/hide */
        @media(min-width:640px){.sm\:block{display:block}}
        @media(max-width:639px){.hidden.sm\:block,.sm\:block.hidden{display:none !important}}
        @media(min-width:768px){
            .md\:text-xs{font-size:12px}.md\:text-sm{font-size:14px}.md\:text-base{font-size:16px}
            .md\:text-lg{font-size:18px}.md\:text-xl{font-size:20px}

            .md\:p-3{padding:12px}.md\:p-4{padding:16px}
            .md\:gap-3{gap:12px}
        }
        /* Grid */
        .grid{display:grid}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
        .gap-2{gap:8px}.gap-3{gap:12px}
        /* Misc */
        .space-y-1>*+*{margin-top:4px}
        [class*="text-\["] { font-size: inherit; } /* fallback for arbitrary sizes */
        .text-\[8px\]{font-size:8px}.text-\[9px\]{font-size:9px}.text-\[10px\]{font-size:10px}
        .text-\[11px\]{font-size:11px}

               class="flex-1 bg-brand-blue text-white py-2.5 rounded-xl font-bold text-center text-xs md:text-sm hover:bg-blue-600 active:scale-95 transition-all shadow flex items-center justify-center gap-1">
                <i class="fa-solid fa-globe text-xs"></i> الموقع الرسمي

            <a id="footer-whatsapp" href="https://wa.me/966540699999" target="_blank"
               class="flex-1 text-white py-2.5 rounded-xl font-bold text-center text-xs md:text-sm active:scale-95 transition-all shadow flex items-center justify-center gap-1"

<!-- ══════════ LIBRARIES ══════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-curve@1.0.0/leaflet.curve.min.js"></script>

<script>
'use strict';
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3_RJxuoLnFVTah6dp0g1hrrvgwKOKxoIJsETftPOAC-5bd5lNs_6hHVTiLD6rOq5EvdOJFvM72Ixz/pub?output=csv';
// Single sheet — all data (iftar centers + umrah + official) lives in gid=0
const SHEET_URL = BASE + '&gid=0';
const RIYADH = [24.83, 46.78];
const MAKKAH = [21.4225, 39.8262];
// Fetch strategy: direct first (Google Sheets published URLs support CORS),
// then proxy fallbacks in order of reliability.
const PROXIES = [
    u => u,                                                                       // 0: direct (works on Netlify — Google pub CSV sends CORS headers)
    u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),     // 1: codetabs  (reliable, no rate-limit for small traffic)
    u => 'https://corsproxy.io/?url='               + encodeURIComponent(u),     // 2: corsproxy.io
    u => 'https://corsproxy.org/?'                  + encodeURIComponent(u),     // 3: corsproxy.org
    u => 'https://api.allorigins.win/raw?url='      + encodeURIComponent(u),     // 4: allorigins (slowest, last resort)
];

// ═══════════════════════════════════════════════════
// HIJRI DATE  (uses browser's built-in Intl API)
// ═══════════════════════════════════════════════════
(function setHijriDate() {
    try {
        const fmt = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
            day: 'numeric', month: 'long'
        });
        document.getElementById('hijri-date').textContent = fmt.format(new Date());
    } catch(e) {
        document.getElementById('hijri-date').textContent = 'رمضان ١٤٤٧';
    }
})();

// ═══════════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════════
const map = L.map('map', { zoomControl: false }).setView(RIYADH, 11);
L.control.zoom({ position: 'topleft' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19
}).addTo(map);
const cluster = L.markerClusterGroup({ maxClusterRadius: 45, showCoverageOnHover: false });

// ═══════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════
function pinIcon(color, w, h) {
    return L.divIcon({
        className: 'interactive-marker',
        html: `<svg viewBox="0 0 384 512" width="${w}" height="${h}" style="filter:drop-shadow(0 3px 6px rgba(0,0,0,.25))"><path fill="${color}" stroke="#fff" stroke-width="14" d="M172.3 501.7C27 291 0 269.4 0 192 0 86 86 0 192 0s192 86 192 192c0 77.4-27 99-172.3 309.7-9.5 13.8-29.9 13.8-39.5 0zM192 272c44.2 0 80-35.8 80-80s-35.8-80-80-80-80 35.8-80 80 35.8 80 80 80z"/></svg>`,
        iconSize: [w,h], iconAnchor: [w/2,h], popupAnchor: [0,-h]
    });
}
const greenIcon = pinIcon('#6cc368', 32, 42);
const goldIcon  = L.divIcon({
    className: 'makkah-icon interactive-marker',
    html: `<div class="makkah-pulse"></div><svg viewBox="0 0 384 512" width="38" height="50" style="filter:drop-shadow(0 4px 10px rgba(0,0,0,.3))"><path fill="#d4af37" stroke="#fff" stroke-width="10" d="M172.3 501.7C27 291 0 269.4 0 192 0 86 86 0 192 0s192 86 192 192c0 77.4-27 99-172.3 309.7-9.5 13.8-29.9 13.8-39.5 0zM192 272c44.2 0 80-35.8 80-80s-35.8-80-80-80-80 35.8-80 80 35.8 80 80 80z"/></svg>`,
    iconSize: [38,50], iconAnchor: [19,50], popupAnchor: [0,-50]
});

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function hideLoading() {
    const el = document.getElementById('loading-overlay');
    if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 600); }
}

function driveUrl(url) {
    if (!url || !url.trim()) return '';
    if (url.includes('drive.google.com')) {
        const m = url.match(/\/d\/([\w-]+)/);
        if (m) return 'https://drive.google.com/uc?export=view&id=' + m[1];
    }
    return url.trim();
}

function animateCount(id, end, ms) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('shimmer');
    if (!end) { el.textContent = '٠'; return; }
    let t0 = null;
    (function step(ts) {
        if (!t0) t0 = ts;
        const p = Math.min((ts - t0) / ms, 1);
        el.textContent = Math.floor((1 - Math.pow(1-p,3)) * end).toLocaleString('ar-SA');
        if (p < 1) requestAnimationFrame(step);
    })(performance.now());
}

function statBox(label, val, bg, tc, large) {
    return `<div class="${bg} border p-2.5 rounded-xl text-center">
        <p class="text-gray-500 text-[10px] font-bold mb-1">${label}</p>
        <p class="font-extrabold ${tc} ${large?'text-xl':'text-sm'} leading-none">${val}</p>
    </div>`;
}

// ═══════════════════════════════════════════════════
// DATA FETCHING  — tries proxies sequentially,
// resolves with first valid CSV or falls back.
// Each sheet is fetched independently so the map
// can show centers the moment iftar data arrives,
// without waiting for umrah/official to finish.
// ═══════════════════════════════════════════════════
function csvToRows(text, requiredCol) {
    return new Promise(function(res, rej) {
        Papa.parse(text, {
            header: true, skipEmptyLines: true,
            complete: function(r) {
                const keys = Object.keys((r.data && r.data[0]) || {});
                if (r.data.length > 0 && keys.some(k => k.trim() === requiredCol)) {
                    res(r.data);
                } else {
                    rej(new Error('col missing: ' + requiredCol + ' | got: ' + keys.join(',')));
                }
            },
            error: rej
        });
    });
}

function fetchText(targetUrl) {
    // idx 0 = direct; use native fetch() — faster and no PapaParse overhead
    // idx 1+ = proxy URLs; also use fetch() so we control timeout
    return new Promise(function(res, rej) {
        const controller = new AbortController();
        const timer = setTimeout(function() { controller.abort(); }, 10000); // 10-second timeout
        fetch(targetUrl, { signal: controller.signal })
            .then(function(r) {
                clearTimeout(timer);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.text();
            })
            .then(function(text) {
                if (!text || text.trim().startsWith('<')) throw new Error('HTML response');
                res(text);
            })
            .catch(function(err) { clearTimeout(timer); rej(err); });
    });
}

function tryStrategies(url, col, idx) {
    if (idx >= PROXIES.length) return Promise.reject(new Error('all proxies failed'));
    const targetUrl = PROXIES[idx](url);
    const label = idx === 0 ? 'direct' : 'proxy ' + idx;
    console.log('[مشكاة] trying ' + label + ' …');
    return fetchText(targetUrl)
        .then(function(raw) {
            return csvToRows(raw, col).then(function(rows) {
                cacheSet(url, raw);
                console.log('[مشكاة] ✅ ' + label + ' worked — ' + rows.length + ' rows');
                return rows;
            });
        })
        .catch(function(err) {
            console.warn('[مشكاة] ' + label + ' failed:', err.message, '— trying next');
            return tryStrategies(url, col, idx + 1);
        });
}

// ─── localStorage cache (5-minute TTL) ───────────────
const CACHE_TTL     = 5 * 60 * 1000; // 5 minutes in ms
const CACHE_VERSION = 'v6';           // bump this to bust all cached data

function cacheKey(url)  { return 'mishkat_' + CACHE_VERSION + '_' + btoa(url).slice(-20); }
function cacheGet(url) {
    try {
        const raw = localStorage.getItem(cacheKey(url));
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (Date.now() - obj.ts > CACHE_TTL) { localStorage.removeItem(cacheKey(url)); return null; }
        console.log('[مشكاة] 📦 Cache HIT:', url.slice(-40));
        return obj.data;
    } catch(e) { return null; }
}
function cacheSet(url, data) {
    try { localStorage.setItem(cacheKey(url), JSON.stringify({ ts: Date.now(), data })); }
    catch(e) { /* quota exceeded — silently ignore */ }
}

function fetchSheet(url, col, fallbackCSV) {
    const cached = cacheGet(url);
    if (cached) {
        return csvToRows(cached, col)
            .then(function(rows) {
                console.log('[مشكاة] 📦 FROM CACHE — col:', col, '| rows:', rows.length);
                return rows;
            })
            .catch(function() {
                console.warn('[مشكاة] Cache parse failed for', col, '— hitting network');
                return tryStrategies(url, col, 0).catch(function() {
                    console.warn('[مشكاة] ⚠️ FALLBACK used for', col);
                    return csvToRows(fallbackCSV, col);
                });
            });
    }
    return tryStrategies(url, col, 0)
        .then(function(rows) {
            console.log('[مشكاة] 🌐 FROM NETWORK — col:', col, '| rows:', rows.length, '| sample:', JSON.stringify(rows[0]).slice(0,120));
            return rows;
        })
        .catch(function(err) {
            console.error('[مشكاة] ⚠️ FALLBACK used for', col, '| reason:', err.message);
            return csvToRows(fallbackCSV, col);
        });
}

// ═══════════════════════════════════════════════════
// FALLBACKS
// ═══════════════════════════════════════════════════
const FB = {
    iftar: [
        'ID,Center name,Lat,lng,daily_meals,total_meals,quran_sessions,new_muslims,image_url',
        '1,جامع المهيني,24.8620,46.8050,1200,24000,15,5,'
    ].join('\n'),
    umrah: [
        'trip_id,destination,total_pilgrims,nationalities,gallery_link',
        '1,مكة المكرمة,0,—,'
    ].join('\n'),
    official: [
        'donation_link,whatsapp_contact,official_website,main_title',
        'https://store.dawasahafa.org.sa/,966540699999,https://www.dawasahafa.org.sa/,مشاريع رمضان ١٤٤٧'
    ].join('\n')
};

// ═══════════════════════════════════════════════════
// RENDER: IFTAR  (called as soon as iftar sheet ready)
// ═══════════════════════════════════════════════════
function renderIftar(rows) {
    let total = 0;
    let totalNewMuslims = 0;
    rows.forEach(function(row) {
        const lat = parseFloat(row['Lat']), lng = parseFloat(row['lng']);
        if (isNaN(lat) || isNaN(lng)) return;

        const daily = parseInt(row['daily_meals'])    || 0;
        const meals = parseInt(row['total_meals'])    || 0;
        const quran = parseInt(row['quran_sessions']) || 0;
        const newM  = parseInt(row['new_muslims'])    || 0;
        const img   = driveUrl(row['image_url']);
        const name  = (row['Center name'] || 'مركز تفطير').trim();
        total += meals;
        totalNewMuslims += newM;

        const imgHTML = img
            ? `<img src="${img}" class="w-full h-36 object-cover" alt="صورة المركز"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
               <div style="display:none" class="w-full h-3 bg-brand-green"></div>`
            : `<div class="w-full h-3 bg-brand-green"></div>`;

        let stats = '';
        if (daily > 0) stats += statBox('وجبات يومياً',   daily.toLocaleString('ar-SA'), 'bg-gray-50 border-gray-100',   'text-gray-800',   false);
        if (meals > 0) stats += statBox('إجمالي الوجبات', meals.toLocaleString('ar-SA'), 'bg-blue-50 border-blue-100',   'text-brand-blue', true);
        if (quran > 0) stats += statBox('الدروس المصاحبة',   quran,                          'bg-green-50 border-green-100', 'text-brand-green',false);

        const newBanner = newM > 0
            ? `<div class="mt-2 bg-green-50 border border-green-100 p-2.5 rounded-xl flex justify-between items-center">
                   <span class="text-xs text-brand-green font-bold"><i class="fa-solid fa-user-plus ml-1"></i>مسلمون جدد</span>
                   <span class="font-extrabold text-brand-green text-lg">${newM}</span>
               </div>` : '';

        const popup = `<div class="bg-white rounded-xl overflow-hidden">
            ${imgHTML}
            <div class="p-4">
                <h3 class="font-extrabold text-gray-900 text-base mb-3 pb-2 border-b border-gray-100 flex items-center gap-2">
                    <i class="fa-solid fa-mosque text-brand-green text-sm"></i>${name}
                </h3>
                <div class="grid grid-cols-2 gap-2">${stats}</div>
                ${newBanner}
            </div>
        </div>`;

        const m = L.marker([lat, lng], { icon: greenIcon });
        m.bindPopup(popup, { maxWidth: 300 });
        cluster.addLayer(m);
    });

    map.addLayer(cluster);
    animateCount('global-counter', total, 2200);
    animateCount('newmuslims-counter', totalNewMuslims, 2200);
    // Hide loading as soon as centers appear — don't wait for other sheets
    hideLoading();
    console.log('[مشكاة] ✅ Iftar centers rendered:', rows.length, '| Total meals:', total, '| New Muslims:', totalNewMuslims);
}

// ═══════════════════════════════════════════════════
// RENDER: UMRAH
// ═══════════════════════════════════════════════════
function renderUmrah(rows) {
    let pilgrims = 0;
    const nats = new Set();
    let gallery = '';
    (rows || []).forEach(function(d) {
        pilgrims += parseInt(d['total_pilgrims']) || 0;
        (d['nationalities'] || '').split(/[،,]+/).forEach(x => { x = x.trim(); if (x) nats.add(x); });
        if (!gallery && d['gallery_link'] && d['gallery_link'] !== '#') gallery = d['gallery_link'].trim();
    });

    const galleryBtn = gallery
        ? `<a href="${gallery}" target="_blank" class="mt-3 block w-full text-center bg-yellow-50 border border-yellow-200 text-brand-gold font-bold text-sm py-2 rounded-xl hover:bg-yellow-100 transition"><i class="fa-solid fa-images ml-1"></i>معرض الصور</a>`
        : '';

    const popup = `<div class="bg-white rounded-xl overflow-hidden">
        <div class="h-3 w-full bg-brand-gold"></div>
        <div class="p-5">
            <h3 class="font-extrabold text-gray-900 text-lg mb-4 text-center border-b border-gray-100 pb-3">
                <i class="fa-solid fa-kaaba text-brand-gold ml-2"></i>حصاد رحلات العمرة
            </h3>
            <div class="grid grid-cols-2 gap-3 mb-3">
                ${pilgrims > 0 ? `<div class="bg-yellow-50 border border-yellow-100 p-3 rounded-xl text-center">
                    <p class="text-gray-500 text-xs font-bold mb-1">المعتمرون</p>
                    <p class="font-extrabold text-brand-gold text-2xl">${pilgrims.toLocaleString('ar-SA')}</p>
                </div>` : ''}
                <div class="bg-yellow-50 border border-yellow-100 p-3 rounded-xl text-center">
                    <p class="text-gray-500 text-xs font-bold mb-1">عدد الرحلات</p>
                    <p class="font-extrabold text-brand-gold text-2xl">${rows.length}</p>
                </div>
            </div>
            ${nats.size > 0 && ![...nats].every(n => n === '—') ? `<div class="bg-gray-50 border border-gray-100 p-3 rounded-xl text-center">
                <p class="text-xs text-gray-500 font-bold mb-1">الجاليات المستفيدة</p>
                <p class="text-gray-800 font-semibold text-sm">${[...nats].join('، ')}</p>
            </div>` : ''}
            ${galleryBtn}
        </div>
    </div>`;

    const mk = L.marker(MAKKAH, { icon: goldIcon, zIndexOffset: 1000 }).addTo(map);
    mk.bindPopup(popup, { maxWidth: 310 });
    if (pilgrims > 0) {
        animateCount('pilgrims-counter', pilgrims, 2200);
    } else {
        const el = document.getElementById('pilgrims-counter');
        if (el) { el.textContent = '—'; el.classList.remove('shimmer'); }
    }
    console.log('[مشكاة] ✅ Umrah data — pilgrims:', pilgrims, '| trips:', rows.length, '| nats:', [...nats].join(', '));
    if (pilgrims === 6000) console.warn('[مشكاة] ⚠️ Pilgrims = 6000 — this looks like fallback data!');

    if (typeof L.curve !== 'undefined') {
        L.curve(['M', RIYADH, 'Q', [23.0, 42.8], MAKKAH], {
            color: '#d4af37', weight: 2.5, opacity: .75,
            className: 'umrah-path', interactive: false
        }).addTo(map);
    }
    console.log('[مشكاة] ✅ Umrah rendered:', rows.length, 'trips');
}

// ═══════════════════════════════════════════════════
// RENDER: OFFICIAL LINKS
// ═══════════════════════════════════════════════════
function renderOfficial(rows) {
    if (!rows || !rows.length) return;
    const d = rows[0];
    const donate  = (d['donation_link']    || '').trim();
    const wa      = (d['whatsapp_contact'] || '').trim();
    const website = (d['official_website'] || '').trim();
    if (donate)  document.getElementById('footer-donate').href  = donate;
    if (website) document.getElementById('footer-website').href = website;
    if (wa) {
        document.getElementById('footer-whatsapp').href =
            wa.startsWith('http') ? wa : 'https://wa.me/' + wa.replace(/\D/g,'');
    }
    console.log('[مشكاة] ✅ Official links updated');
}

// ═══════════════════════════════════════════════════
// ADMIN — Shift+Click → copy coords to clipboard
// ═══════════════════════════════════════════════════
map.on('click', function(e) {
    if (!e.originalEvent.shiftKey) return;
    const txt = e.latlng.lat.toFixed(6) + ',' + e.latlng.lng.toFixed(6);
    navigator.clipboard && navigator.clipboard.writeText(txt);
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;z-index:9999;font-family:Tajawal,sans-serif;direction:rtl;white-space:nowrap';
    t.textContent = '📍 ' + txt;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
});

// ═══════════════════════════════════════════════════
// BOOT — GRADUAL LOADING
// Each sheet fetched independently.
// Iftar → renders markers + hides loading immediately.
// Single fetch — one sheet contains everything.
// ═══════════════════════════════════════════════════
const safetyTimer = setTimeout(hideLoading, 14000);

fetchSheet(SHEET_URL, 'Center name', FB.iftar)
    .then(function(rows) {
        console.log('[مشكاة] ✅ Single sheet loaded:', rows.length, 'rows');
        renderIftar(rows);    // reads: Lat, lng, meals, new_muslims, image_url …
        renderUmrah(rows);    // reads: total_pilgrims, nationalities, gallery_link
        renderOfficial(rows); // reads: donation_link, whatsapp_contact, official_website
    })
    .catch(function(err) {
        console.error('[مشكاة] Sheet failed:', err);
        hideLoading();
    })
    .finally(function() {
        clearTimeout(safetyTimer);
    });

</script>
